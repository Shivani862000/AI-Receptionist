services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-receptionist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_receptionist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_receptionist"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ai-receptionist

  backend:
    build:
      context: ./backend
      target: development
    container_name: ai-receptionist-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env.development
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_receptionist?schema=public
      FRONTEND_URL: http://localhost:3001
      CORS_ORIGINS: http://localhost:3001
      BACKEND_BASE_URL: http://localhost:4000
      NODE_ENV: development
    command: sh -c "corepack pnpm install && corepack pnpm prisma:generate && corepack pnpm start:dev"
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - ai-receptionist

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: ai-receptionist-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./frontend/.env.development
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
      NODE_ENV: development
    command: sh -c "corepack pnpm install && corepack pnpm dev --hostname 0.0.0.0 --port 3001"
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - ai-receptionist

  redis:
    image: redis:7-alpine
    container_name: ai-receptionist-redis
    restart: unless-stopped
    profiles: ["optional"]
    ports:
      - "6379:6379"
    networks:
      - ai-receptionist

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ai-receptionist-pgadmin
    restart: unless-stopped
    profiles: ["optional"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-receptionist

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
  backend_uploads:
  backend_logs:

networks:
  ai-receptionist:
    driver: bridge
